database:
  url: sqlite:///data/tw_quant.sqlite

data:
  market: TSE
  request_timeout_seconds: 15
  stop_on_data_anomaly: true
  twse_url: https://www.twse.com.tw/rwd/zh/afterTrading/MI_INDEX

strategy:
  minimum_total_score: 70
  min_history_days: 40
  max_candidates: 20
  weights:
    trend: 0.30
    momentum: 0.25
    fundamental: 0.15
    chip: 0.15
    risk: 0.15

risk:
  initial_equity: 1000000
  max_position_pct: 0.10
  max_portfolio_exposure_pct: 0.60
  max_trade_risk_pct: 0.01
  default_stop_loss_pct: 0.08
  min_liquidity_value: 5000000
  max_volatility_20: 0.08

trading_cost:
  commission_rate: 0.000399
  min_commission: 1
  sell_tax_rate_stock: 0.003
  sell_tax_rate_etf: 0.001
  sell_tax_rate_bond_etf: 0.0
  slippage_rate: 0.001

exit_strategy:
  take_profit_1_pct: 0.10
  take_profit_1_sell_pct: 0.50
  take_profit_2_pct: 0.20
  take_profit_2_sell_pct: 1.00
  trailing_stop_activate_pct: 0.08
  trailing_stop_drawdown_pct: 0.06
  ma_exit_window: 20
  max_holding_days: 20
  min_profit_for_holding: 0.03

backtest:
  initial_cash: 1000000
  top_n: 10
  transaction_cost_bps: 14.25
  max_holding_days: 20
